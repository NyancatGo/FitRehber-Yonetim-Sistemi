services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - ./media:/app/media
      - static_volume:/app/staticfiles
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    ports:
      - "${APP_PORT:-8001}:8000"
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: mysql:8.0
    command: --host-cache-size=0
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"

volumes:
  mysql_data:
  static_volume:

