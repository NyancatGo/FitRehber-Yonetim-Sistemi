<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>Uygulamaya Yönlendiriliyorsunuz | FitRehber</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Google Fonts - Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: rgba(22, 24, 30, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #F5A623;
            --primary-hover: #e0961b;
            --text-main: #ffffff;
            --text-muted: #9ba1b0;
            --glow-color: rgba(245, 166, 35, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(245, 166, 35, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 80, 240, 0.03) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Background grid effect */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.007) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.007) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            max-width: 440px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                        0 0 50px var(--glow-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1;
            transform: translateY(0);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .logo-area {
            margin-bottom: 25px;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, #FFB84D 0%, #F5A623 100%);
            color: #0d0e12;
            font-size: 32px;
            box-shadow: 0 8px 24px rgba(245, 166, 35, 0.3);
            margin-bottom: 12px;
            position: relative;
        }

        /* Pulse wave animation */
        .logo-pulse {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            background: var(--primary);
            opacity: 0.4;
            z-index: -1;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 0; }
            100% { transform: scale(0.95); opacity: 0; }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #FFFFFF 0%, #E2E8F0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: linear-gradient(135deg, #FFB84D 0%, #F5A623 100%);
            color: #0d0e12;
            text-decoration: none;
            padding: 16px 28px;
            border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(245, 166, 35, 0.2);
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            outline: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 166, 35, 0.3);
            background: linear-gradient(135deg, #FFC470 0%, #FAAF3B 100%);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-icon {
            margin-left: 8px;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .btn:hover .btn-icon {
            transform: translateX(4px);
        }

        /* Loading / waiting spinner */
        .spinner-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer-note {
            margin-top: 25px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <div class="container">
        <div class="logo-area">
            <div class="logo-icon">
                💪
                <div class="logo-pulse"></div>
            </div>
            <h1>Giriş Başarılı!</h1>
        </div>
        
        <div class="spinner-container">
            <div class="spinner"></div>
        </div>
        
        <p>Hesabınız başarıyla doğrulandı. Uygulamaya yönlendiriliyorsunuz... Otomatik yönlendirme çalışmazsa aşağıdaki butona tıklayabilirsiniz.</p>
        
        <a id="redirect-link" href="{{ callback_url }}" class="btn">
            Uygulamaya Geri Dön
            <span class="btn-icon">➔</span>
        </a>
        
        <div class="footer-note">
            FitRehber Güvenli Mobil Giriş Portalı
        </div>
    </div>

    <script>
        var callbackUrl = "{{ callback_url|escapejs }}";
        var isAndroid = /Android/i.test(navigator.userAgent);
        var targetUrl = callbackUrl;
        
        if (isAndroid) {
            // Convert "fitrehber://oauth/callback?code=...&state=..."
            // to "intent://oauth/callback?code=...&state=...#Intent;scheme=fitrehber;package=tr.com.fitrehber.fitrehber_mobile;end;"
            var urlParts = callbackUrl.replace("fitrehber://", "");
            targetUrl = "intent://" + urlParts + "#Intent;scheme=fitrehber;package=tr.com.fitrehber.fitrehber_mobile;end;";
        }
        
        // Update the button link to use the most reliable protocol
        document.getElementById("redirect-link").href = targetUrl;
        
        // Auto-redirect function
        function triggerRedirect() {
            window.location.href = targetUrl;
            
            // Fallback for Android in case intent:// was blocked or failed
            if (isAndroid) {
                setTimeout(function() {
                    window.location.href = callbackUrl;
                }, 500);
            }
        }
        
        // Immediate redirection attempt
        triggerRedirect();
        
        // Backup redirection attempts
        setTimeout(triggerRedirect, 500);
        setTimeout(triggerRedirect, 1500);
    </script>
</body>
</html>
